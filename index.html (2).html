<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Simulador de Atendimento — Espaço Fácil (Dia 1)</title>
<style>
  :root {
    color-scheme: light;
    --brand-green-dark: #002E24;
    --brand-green-light: #007D59;
    --brand-amber: #F9B112;
    --brand-grey: #575656;
    --bg: #dfe8e4;
    --card-bg: #ffffff;
    --text: #1c1f1e;
    --text-muted: #575656;
    --border: #c7d1cb;
    --correct: #007D59;
    --correct-bg: #e5f3ed;
    --wrong: #b3261e;
    --wrong-bg: #fceceb;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    line-height: 1.5;
  }
  .app { max-width: 760px; margin: 0 auto; padding: 24px 20px 60px; }
  header.top {
    background: linear-gradient(135deg, var(--brand-green-dark) 0%, var(--brand-green-light) 100%);
    color: #fff;
    border-radius: 14px;
    padding: 22px 24px 20px;
    margin-bottom: 20px;
    border-bottom: 3px solid var(--brand-amber);
  }
  .brand-tag {
    display:inline-block;
    background: var(--brand-amber);
    color: var(--brand-green-dark);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: .06em;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 999px;
    margin-bottom: 10px;
  }
  header.top h1 { margin: 0 0 4px; font-size: 20px; }
  header.top p { margin: 0; color: #cfe3d8; font-size: 13.5px; }

  .badge {
    display: inline-block;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: .04em;
    padding: 3px 10px;
    border-radius: 999px;
    text-transform: uppercase;
  }
  .badge-produto { background: var(--brand-amber); color: var(--brand-green-dark); }
  .badge-etapas { background: var(--brand-green-light); color: #fff; }

  .progress-wrap { display:flex; align-items:center; gap:10px; margin: 0 0 18px; font-size: 13px; color: var(--text-muted); }
  .progress-track { flex:1; height: 8px; background: #e6e6e2; border-radius: 999px; overflow:hidden; }
  .progress-fill { height:100%; background: var(--brand-amber); border-radius: 999px; transition: width .25s ease; }

  .card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-left: 4px solid var(--brand-green-dark);
    border-radius: 14px;
    padding: 22px 22px 20px;
    margin-bottom: 16px;
    box-shadow: 0 2px 6px rgba(0,46,36,0.12), 0 1px 2px rgba(0,46,36,0.08);
  }
  .card h2 { font-size: 16px; margin: 10px 0 14px; }
  .context { font-size: 15px; line-height: 1.55; }

  .options { display:flex; flex-direction:column; gap:9px; margin-top: 16px; }
  .opt-btn {
    text-align:left;
    padding: 11px 14px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: #fff;
    font-size: 14.5px;
    cursor: pointer;
    transition: border-color .15s ease, background .15s ease;
  }
  .opt-btn:hover:not(:disabled) { border-color: var(--brand-green-dark); }
  .opt-btn:disabled { cursor: default; }
  .opt-btn.correct { background: var(--correct-bg); border-color: var(--correct); color: var(--correct); font-weight:600; }
  .opt-btn.wrong { background: var(--wrong-bg); border-color: var(--wrong); color: var(--wrong); font-weight:600; }
  .opt-btn.dim { opacity: .55; }

  input[type="text"] {
    width: 100%;
    padding: 10px 12px;
    border-radius: 9px;
    border: 1px solid var(--border);
    font-size: 14.5px;
    font-family: inherit;
    margin-top: 8px;
  }
  input[type="text"]:focus { outline: 2px solid var(--brand-green-dark); border-color: transparent; }
  label.field-label { font-size: 13px; color: var(--text-muted); font-weight:600; }

  .btn {
    display:inline-block;
    padding: 10px 18px;
    border-radius: 9px;
    border: none;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
  }
  .btn-primary { background: var(--brand-green-dark); color:#fff; }
  .btn-amber { background: var(--brand-amber); color: var(--brand-green-dark); }
  .btn-amber:disabled { background:#f7dfa1; color:#8a8a8a; cursor:not-allowed; }
  .btn-outline { background: transparent; color: var(--brand-green-dark); border: 1.5px solid var(--brand-green-dark); }
  .btn-row { margin-top: 14px; display:flex; gap:10px; flex-wrap:wrap; }

  .rubric-box {
    margin-top: 16px;
    background: #f2f6f4;
    border: 1px solid #dbe6e0;
    border-radius: 10px;
    padding: 14px 16px;
    font-size: 14px;
  }
  .rubric-box strong { display:block; margin-bottom: 6px; color: var(--brand-green-dark); font-size: 13px; text-transform:uppercase; letter-spacing:.03em; }

  .start-card ul { margin: 10px 0 0; padding-left: 20px; font-size: 14px; color: var(--text-muted); }
  .start-card li { margin-bottom: 6px; }

  .summary-score { font-size: 34px; font-weight:700; color: var(--brand-green-dark); margin: 6px 0 2px; }
  .summary-sub { color: var(--text-muted); font-size: 13.5px; margin-bottom: 18px; }

  table.review { width:100%; border-collapse: collapse; font-size: 13.5px; margin-top: 10px; }
  table.review th, table.review td { text-align:left; padding: 8px 8px; border-bottom: 1px solid var(--border); vertical-align: top; }
  table.review th { color: var(--text-muted); font-weight:600; font-size:12px; text-transform:uppercase; letter-spacing:.03em; }
  .status-pill { display:inline-block; font-size:12px; font-weight:600; padding:2px 9px; border-radius:999px; }
  .status-correct { background: var(--correct-bg); color: var(--correct); }
  .status-wrong { background: var(--wrong-bg); color: var(--wrong); }

  .send-box {
    margin-top: 18px;
    background: #faf6ee;
    border: 1px dashed var(--brand-amber);
    border-radius: 10px;
    padding: 14px 16px;
  }
  .send-box p { margin: 0 0 10px; font-size: 13.5px; color: var(--text-muted); }

  .history { margin-top: 22px; }
  .history h3 { font-size: 13px; text-transform:uppercase; letter-spacing:.03em; color: var(--text-muted); margin-bottom: 10px; }
  .history-item { display:flex; justify-content:space-between; font-size: 13.5px; padding: 8px 0; border-bottom: 1px dashed var(--border); }
  .history-empty { font-size: 13.5px; color: var(--text-muted); }
</style>
</head>
<body>
<div class="app">
  <header class="top">
    <span class="brand-tag">Espaço Fácil</span>
    <h1>Simulador de Atendimento — Dia 1</h1>
    <p>Foco: escolher o produto ideal (armazenamento) e reconhecer a etapa certa do atendimento. 20 casos misturados, múltipla escolha.</p>
  </header>
  <div id="root"></div>
  <div class="history" id="history"></div>
</div>

<script>

    question: "Até que horário ela precisa ser respondida?",
    options: ["Até 18h do mesmo dia", "Até 12h do dia seguinte", "Até 20h do mesmo dia", "Não tem prazo definido"],
    correct: 0,
    explanation: "Mensagem chegou no período vespertino (13h–18h) — prazo de resposta é até as 18h do mesmo dia." },

    question: "Qual é o prazo de resposta?",

    correct: 0,
    explanation: "12h–13h é o período de tolerância (almoço) — é absorvido pelo prazo do vespertino, até as 18h." },

  { id: 19, category: 'Etapas', type: 'mc',

    question: "O que você faz no CRM?",
    options: ["Marcar o negócio como 'Perdido'", "Continuar tentando indefinidamente", "Excluir o negócio do CRM", "Esperar mais 10 dias e tentar de novo"],
    correct: 0,
    explanation: "Follow-up é no máximo 3 tentativas em até 10 dias corridos. Sem resposta na 3ª tentativa, o lead é encerrado e o negócio vai para 'Perdido'." }

const HISTORY_KEY = 'ef_treino_dia1_produto_etapas';
const MANAGER_EMAIL = 'rh@facilespaco.com.br';
// Cole aqui a URL de implantação (/exec) do Google Apps Script, depois de publicá-lo.
// Enquanto estiver vazia, o envio automático fica desativado e só o botão manual de e-mail funciona.
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzEOKsAaV1P1QNW-iaY-4acRvm7kjT7uElSyG5eRnQ0o_GwiFd1OpvLqtxDz9JSwdeZHg/exec';
let summarySent = false;

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

let order = shuffle(SCENARIOS);
let idx = -1; // -1 = start screen
let results = {}; // id -> {status:'correct'|'wrong', selected}
let traineeName = '';

function loadHistory() {
  try { return JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]'); } catch(e) { return []; }
}
function saveHistoryEntry(entry) {
  const h = loadHistory();
  h.unshift(entry);
  localStorage.setItem(HISTORY_KEY, JSON.stringify(h.slice(0, 20)));
}

function computeScore() {
  let total = order.length;
  let sum = 0;
  order.forEach(s => { if (results[s.id] && results[s.id].status === 'correct') sum += 1; });
  return { sum, total };
}

function renderHistory() {
  const h = loadHistory();
  const el = document.getElementById('history');
  if (!h.length) {
    el.innerHTML = '<h3>Tentativas anteriores (neste navegador)</h3><div class="history-empty">Nenhuma tentativa registrada ainda.</div>';
    return;
  }
  el.innerHTML = '<h3>Tentativas anteriores (neste navegador)</h3>' + h.map(item => `
    <div class="history-item">
      <span>${item.name ? item.name + ' — ' : ''}${item.date}</span>
      <span>${item.sum} / ${item.total} (${item.percent}%)</span>
    </div>
  `).join('');
}

function startQuiz() {
  const input = document.getElementById('trainee-name');
  traineeName = input ? input.value.trim() : traineeName;
  order = shuffle(SCENARIOS);
  idx = 0;
  results = {};
  summarySent = false;
  render();
}

function goNext() {
  idx++;
  render();
}

function selectOption(scenario, optionIndex) {
  if (results[scenario.id]) return;
  const correct = optionIndex === scenario.correct;
  results[scenario.id] = { status: correct ? 'correct' : 'wrong', selected: optionIndex };
  render();
}

function renderStart() {
  return `
    <div class="card start-card">
      <span class="badge badge-produto">Prévia</span>
      <h2>Antes de começar</h2>
      <p class="context">${SCENARIOS.length} casos misturados, todos de múltipla escolha: metade sobre qual produto/tamanho indicar, metade sobre reconhecer a etapa certa do atendimento (e as regras obrigatórias de prazo e CRM). A ordem muda a cada tentativa.</p>
      <ul>
        <li>Escolha a opção que você daria de verdade nesse atendimento.</li>
        <li>A correção é imediata, com a explicação de por que aquela é a resposta certa.</li>
        <li>No final você vê a pontuação, uma tabela de revisão e pode enviar o resultado por e-mail.</li>
      </ul>
      <label class="field-label" for="trainee-name">Seu nome (para identificar o resultado)</label>
      <input type="text" id="trainee-name" placeholder="Digite seu nome" value="${traineeName}">
      <div class="btn-row">
        <button class="btn btn-primary" onclick="startQuiz()">Começar</button>
      </div>
    </div>
  `;
}

function renderQuestion(scenario) {
  const res = results[scenario.id];
  const badgeClass = scenario.category === 'Produto' ? 'badge-produto' : 'badge-etapas';
  const answered = !!res;

  let body = `<div class="options">` + scenario.options.map((opt, i) => {
    let cls = 'opt-btn';
    if (answered) {
      if (i === scenario.correct) cls += ' correct';
      else if (i === res.selected) cls += ' wrong';
      else cls += ' dim';
    }
    return `<button class="${cls}" ${answered ? 'disabled' : ''} onclick="selectOption(SCENARIOS.find(s=>s.id===${scenario.id}), ${i})">${opt}</button>`;
  }).join('') + `</div>`;

  if (answered) {
    body += `<div class="rubric-box"><strong>Por quê</strong>${scenario.explanation}</div>`;
  }

  const isLast = idx === order.length - 1;

  return `
    <div class="card">
      <span class="badge ${badgeClass}">${scenario.category}</span>
      <p class="context">${scenario.context}</p>
      <h2>${scenario.question}</h2>
      ${body}
      <div class="btn-row">
        <button class="btn btn-amber" ${answered ? '' : 'disabled'} onclick="${isLast ? 'idx++;render()' : 'goNext()'}">${isLast ? 'Ver resultado' : 'Próximo caso'}</button>
      </div>
    </div>
  `;
}

function buildEmailBody(sum, total, percent) {
  const lines = [];
  lines.push('Resultado do Simulador de Atendimento — Dia 1 — Espaço Fácil');
  lines.push('Funcionária: ' + (traineeName || '(nome não informado)'));
  lines.push('Data: ' + new Date().toLocaleString('pt-BR'));
  lines.push('Pontuação: ' + sum + ' / ' + total + ' (' + percent + '%)');
  lines.push('');
  lines.push('Detalhamento por caso:');
  order.forEach((s, i) => {
    const r = results[s.id] || { status: 'wrong' };
    const label = r.status === 'correct' ? 'CERTO' : 'ERRADO';
    lines.push((i + 1) + '. [' + s.category + '] ' + s.question + ' -> ' + label);
  });
  return lines.join('\n');
}

function sendResultEmail(sum, total, percent) {
  const subject = 'Resultado simulador de atendimento - ' + (traineeName || 'funcionária') + ' - ' + new Date().toLocaleDateString('pt-BR');
  const body = buildEmailBody(sum, total, percent);
  const url = 'mailto:' + MANAGER_EMAIL + '?subject=' + encodeURIComponent(subject) + '&body=' + encodeURIComponent(body);
  window.location.href = url;
}

function sendResultAuto(sum, total, percent) {
  if (!APPS_SCRIPT_URL) return; // não configurado ainda — só o botão manual funciona
  const details = buildEmailBody(sum, total, percent);
  fetch(APPS_SCRIPT_URL, {
    method: 'POST',
    mode: 'no-cors',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify({ name: traineeName, score: sum, total: total, percent: percent, details: details })
  }).catch(function () { /* falha silenciosa — botão manual continua disponível */ });
}

function renderSummary() {
  const { sum, total } = computeScore();
  const percent = total ? Math.round((sum / total) * 100) : 0;
  if (!summarySent) {
    saveHistoryEntry({ name: traineeName, date: new Date().toLocaleString('pt-BR'), sum, total, percent });
    sendResultAuto(sum, total, percent);
    summarySent = true;
  }

  const rows = order.map(s => {
    const r = results[s.id] || { status: 'wrong' };
    const statusClass = 'status-' + r.status;
    const label = r.status === 'correct' ? 'Certo' : 'Errado';
    return `<tr>
      <td><span class="badge ${s.category==='Produto'?'badge-produto':'badge-etapas'}">${s.category}</span></td>
      <td>${s.question}</td>
      <td><span class="status-pill ${statusClass}">${label}</span></td>
    </tr>`;
  }).join('');

  return `
    <div class="card summary-card">
      <h2>Resultado da tentativa</h2>
      <div class="summary-score">${sum} / ${total}</div>
      <div class="summary-sub">${percent}% de aproveitamento ${traineeName ? '— ' + traineeName : ''}</div>
      <table class="review">
        <thead><tr><th>Tipo</th><th>Caso</th><th>Status</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
      <div class="send-box">
        <p>${APPS_SCRIPT_URL ? 'O resultado já foi enviado automaticamente para a liderança quando você chegou nesta tela.' : 'Envio automático ainda não configurado neste link. Use o botão abaixo para enviar o resultado por e-mail.'}</p>
        <button class="btn btn-outline" onclick="sendResultEmail(${sum}, ${total}, ${percent})">Enviar resultado por e-mail (manual)</button>
      </div>
      <div class="btn-row">
        <button class="btn btn-primary" onclick="startQuiz()">Tentar de novo (ordem embaralhada)</button>
      </div>
    </div>
  `;
}

function render() {
  const root = document.getElementById('root');
  const progressWrap = idx >= 0 && idx < order.length ? `
    <div class="progress-wrap">
      <span>Caso ${idx + 1} de ${order.length}</span>
      <div class="progress-track"><div class="progress-fill" style="width:${((idx) / order.length) * 100}%"></div></div>
    </div>` : '';

  let content = '';
  if (idx === -1) content = renderStart();
  else if (idx < order.length) content = renderQuestion(order[idx]);
  else content = renderSummary();

  root.innerHTML = progressWrap + content;
  renderHistory();
}

render();
</script>
</body>
</html>
